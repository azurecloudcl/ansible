---
- hosts: all
  become: yes
  tasks:
    - name: remove apache
      ansible.builtin.apt:
        name: apache2
        state: absent
    - name: update all packages
      ansible.builtin.apt:
        name: "*"
        state: latest
    - name: install apache httpd
      ansible.builtin.apt:
        name: apache2
        state: present
    - name: start service httpd
      ansible.builtin.service:
        name: apache2
        state: started
    - name: Remove the file
      ansible.builtin.file:
        path: /var/www/html/
        state: absent
    - name: install git
      ansible.builtin.apt:
        name: git
        state: present
    - name: Git checkout
      ansible.builtin.git:
        repo: 'https://github.com/Rajthetrainer/ansibledemo'
        dest: /var/www/html/
