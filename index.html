<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Business</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 0; background:#f9f9f9;}
    header {background: #222; color: #fff; padding: 15px; text-align: center;}
    nav a {color: white; margin: 0 15px; text-decoration: none; font-weight:bold;}
    .hero {padding: 60px; text-align: center; background: linear-gradient(135deg,#4CAF50,#2ecc71); color:white;}
    .products {display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 30px;}
    .card {background:white; border-radius: 15px; padding: 15px; text-align: center; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    .card img {width: 100%; height: 180px; object-fit: cover; border-radius:10px;}
    .price {font-size:18px; color:#27ae60; font-weight:bold;}
    button {background: #25D366; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; width:100%;}
    footer {background: #222; color: #fff; text-align: center; padding: 15px;}
    .contact {padding:30px; text-align:center;}
    input, textarea {width:80%; padding:10px; margin:10px; border-radius:8px; border:1px solid #ccc;}
    .admin {background:#fff; margin:20px; padding:20px; border-radius:10px;}
  </style>
</head>
<body>

<header>
  <h1>My Small Business</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
    <a href="#admin">Admin</a>
  </nav>
</header>

<section class="hero" id="home">
  <h2>Welcome to Our Store</h2>
  <p>Quality products with easy ordering & payment</p>
</section>

<section id="products">
  <h2 style="text-align:center;">Our Products</h2>
  <div class="products" id="productList"></div>
</section>

<section class="contact" id="contact">
  <h2>Contact Us</h2>
  <p>Email: your@email.com</p>
  <p>Phone: +91-XXXXXXXXXX</p>
</section>

<section id="admin" class="admin">
  <h2>Add Product (Admin)</h2>
  <input type="text" id="name" placeholder="Product Name"><br>
  <input type="text" id="price" placeholder="Price"><br>
  <input type="text" id="image" placeholder="Image URL"><br>
  <button onclick="addProduct()">Add Product</button>
</section>

<footer>
  <p>© 2026 My Business</p>
</footer>

<script>
let products = [
  {name:"Product 1", price:"499", image:"https://via.placeholder.com/300"},
  {name:"Product 2", price:"799", image:"https://via.placeholder.com/300"}
];

function displayProducts(){
  let list = document.getElementById("productList");
  list.innerHTML = "";
  products.forEach(p => {
    list.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
        <button onclick="orderWhatsApp('${p.name}', '${p.price}')">Order on WhatsApp</button>
        <br><br>
        <button onclick="payNow('${p.name}', '${p.price}')">Pay Now</button>
      </div>
    `;
  });
}

function orderWhatsApp(name, price){
  let phone = "91XXXXXXXXXX";
  let msg = `Hello, I want to order ${name} for ₹${price}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

function payNow(name, price){
  alert("Integrate Razorpay here for " + name);
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  products.push({name, price, image});
  displayProducts();
}

displayProducts();
</script>

</body>
</html>
